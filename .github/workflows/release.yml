name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target: [linux, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.target }} target
        uses: ./.github/actions/build-target
        with:
          target: ${{ matrix.target }}

      - name: Package artifact
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            linux) archive_name="ort_runner-linux-x64-${{ github.ref_name }}" ;;
            android) archive_name="ort_runner-android-arm64-v8a-${{ github.ref_name }}" ;;
          esac
          echo "ARCHIVE_NAME=${archive_name}" >> "$GITHUB_ENV"
          tar -C "build-${{ matrix.target }}/bin" -czf "${archive_name}.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/*.tar.gz --title "${{ github.ref_name }}" --generate-notes
