name: Set up podman toolchain image
description: >
  Restores the ort_runner podman toolchain image (linux or android) from a cached tarball,
  keyed on the target's Containerfile. On a cache miss, builds the image and exports it so
  the next run can skip the apt installs and (for android) the NDK download.

inputs:
  target:
    description: Build target (linux or android)
    required: true

runs:
  using: composite
  steps:
    - name: Ensure podman is available
      shell: bash
      run: command -v podman >/dev/null || (sudo apt-get update && sudo apt-get install -y podman)

    - name: Restore cached image tarball
      id: cache-image
      uses: actions/cache@v4
      with:
        path: /tmp/podman-image-${{ inputs.target }}.tar
        key: podman-image-${{ runner.os }}-${{ inputs.target }}-${{ hashFiles(format('podman/Containerfile.{0}', inputs.target)) }}

    - name: Load cached image
      if: steps.cache-image.outputs.cache-hit == 'true'
      shell: bash
      run: podman load -i /tmp/podman-image-${{ inputs.target }}.tar

    - name: Build image
      if: steps.cache-image.outputs.cache-hit != 'true'
      shell: bash
      run: scripts/build_image.py ${{ inputs.target }}

    - name: Export image to tarball
      if: steps.cache-image.outputs.cache-hit != 'true'
      shell: bash
      run: podman save -o /tmp/podman-image-${{ inputs.target }}.tar ort-runner-builder-${{ inputs.target }}
