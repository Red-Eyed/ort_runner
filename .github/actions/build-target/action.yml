name: Build ort_runner target
description: >
  Fetches the ONNX Runtime SDK and compiles ort_runner for the given target inside its podman
  toolchain image, reusing the image, SDK, and ccache caches across runs.

inputs:
  target:
    description: Build target (linux or android)
    required: true

runs:
  using: composite
  steps:
    - name: Ensure ccache directory exists
      shell: bash
      run: mkdir -p ~/.ccache

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-${{ runner.os }}-${{ inputs.target }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ inputs.target }}-

    - name: Restore ONNX Runtime SDK
      uses: actions/cache@v4
      with:
        path: sdk/
        key: sdk-${{ inputs.target }}-${{ hashFiles('scripts/fetch_onnxruntime.sh') }}

    - name: Set up podman toolchain image
      uses: ./.github/actions/setup-podman-image
      with:
        target: ${{ inputs.target }}

    - name: Build
      shell: bash
      run: scripts/build.py ${{ inputs.target }}
